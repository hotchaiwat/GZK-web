<html lang="th">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root { --gzk-red: #e74c3c; --gzk-blue: #2c3e50; --gzk-light: #f8f9fa; --gzk-dark-blue: #1a252f; --gzk-orange: #ff6600; }
        body { margin: 0; font-family: 'Sarabun', sans-serif; background: var(--gzk-light); color: #333; }
        
        /* --- Sticky Header --- */
        .sticky-wrapper {
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        header {

            border-bottom: 1px solid #eee;
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        /* ส่วนพื้นที่ว่างด้านซ้าย เพื่อหลอกให้ Logo อยู่กลางพอดี */
        .header-left-spacer {
            flex: 1;
            display: flex;
        }

        /* Logo Area - ปรับให้อยู่ตรงกลาง */
        .logo-group {
            flex: 0 0 auto;

        }

            display: inline-block;
            transition: transform 0.3s ease;

        .logo-link:hover { transform: scale(1.05); }
        .logo-link img { width: 280px; height: auto; display: block; margin: 0 auto; }

        .header-slogan {
            color: var(--gzk-blue);
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 8px;
        }

        /* Banner ฝั่งขวา */
        .header-banner {

            display: flex;
            justify-content: flex-end;

            border-left: 3px solid var(--gzk-red);
            padding-left: 20px;

        .banner-content h3 {
            margin: 0;
            color: var(--gzk-blue);
            font-size: 1.1rem;
            font-weight: bold;
        }

        .banner-content p {
            margin: 5px 0 0;
            color: #666;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        /* --- Service Nav --- */
        .service-nav { 
            background: var(--gzk-dark-blue); 
            padding: 15px 5px; 
            text-align: center; 
            border-bottom: 4px solid var(--gzk-blue);
        }
        
        .nav-links-container {

            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            max-width: 95%;
            margin: 0 auto;
        }

        .service-nav a { 
            text-decoration: none; 
            font-size: 0.95rem; 
            font-weight: bold; 
            transition: 0.3s; 
            padding: 10px 22px; 
            border-radius: 30px;
            color: white;
            background: var(--gzk-orange);
            box-shadow: 0 4px 10px rgba(255, 102, 0, 0.2);

        .service-nav a:hover { background: white; color: var(--gzk-orange); transform: translateY(-2px); }
        .service-nav a.contact-btn { background: var(--gzk-red); box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3); }

        .hero { background: var(--gzk-blue); color: white; padding: 30px 15px; text-align: center; }
        .hero h1 { font-size: 2.2rem; margin-bottom: 10px; }
        .hero p { font-size: 1.2rem; opacity: 0.9; margin: 0 auto; max-width: 600px; }

        .highlight-text { color: var(--gzk-orange); }

        .info-card p { font-size: 1.1rem; color: #666; }

        .card-content p { font-weight: bold; color: #555; margin-top: 15px; }
