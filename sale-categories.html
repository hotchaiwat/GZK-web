<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หมวดหมู่สินค้า - GZK Co., Ltd.</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gzk-red: #e74c3c; --gzk-blue: #2c3e50; --gzk-light: #f0f4f8; }
        body { margin: 0; font-family: 'Sarabun', sans-serif; background: var(--gzk-light); }
        header { background: white; text-align: center; padding: 20px; border-bottom: 4px solid var(--gzk-blue); }
        .nav-back { padding: 20px; max-width: 1100px; margin: 0 auto; }
        .nav-back a { color: var(--gzk-blue); text-decoration: none; font-weight: bold; }
        .container { max-width: 1100px; margin: 20px auto 40px; padding: 20px; }
        header {
    background: white;
    text-align: center;
    padding: 30px 20px; /* เพิ่มพื้นที่ว่างด้านบนและล่างให้ดูพรีเมียม */
    border-bottom: 4px solid var(--gzk-blue);
}

.logo-link {
    display: inline-block;
    text-decoration: none;
    transition: transform 0.3s ease; /* เพิ่มลูกเล่นเวลาเอาเมาส์วาง */
}

.logo-link:hover {
    transform: scale(1.02); /* ขยายขึ้นเล็กน้อยเมื่อเอาเมาส์ไปวาง */
}

.logo-link img {
    width: 350px; /* <--- ปรับตัวเลขนี้เพื่อกำหนดขนาดความกว้างที่ต้องการให้เท่ากันทุกหน้า */
    height: auto;
    display: block;
    margin: 0 auto;
}
        .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .category-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; text-align: center; text-decoration: none; color: inherit; }
        .category-card:hover { transform: translateY(-10px); outline: 3px solid var(--gzk-red); }
        .category-img { width: 100%; height: 250px; object-fit: contain; padding: 20px; background: #fff; /* ใช้คู่กันแบบนี้จะปลอดภัยกว่าครับ */
    position: relative;
    left: -25px; }
        .category-info { padding: 20px; background: #fff; }
        .category-info h2 { color: var(--gzk-blue); margin: 0; }
    </style>
</head>
<body>
    <header>
    <a href="index.html" class="logo-link">
        <img src="GZK_logo_with_slogan.jpg" alt="GZK Co., Ltd.">
    </a>
</header>

    <div class="nav-back">
        <a href="index.html">← กลับหน้าหลัก</a>
    </div>

    <div class="container">
        <h1 style="text-align:center; color:var(--gzk-blue); margin-bottom: 40px;">หมวดหมู่สินค้า</h1>
        <div class="category-grid">
            
            <a href="product-turnstile.html" class="category-card">
                <img src="image-turnstile.jpg" alt="Turnstile" class="category-img">
                <div class="category-info">
                    <h2>Turnstile Gate</h2>
                    <p>เครื่องกั้นแบบ 3 ขา</p>
                </div>
            </a>

            <a href="product-swing.html" class="category-card">
                <img src="image-swing.jpg" alt="Swing Gate" class="category-img">
                <div class="category-info">
                    <h2>Swing Gate</h2>
                    <p>ประตูกั้นแบบบานสวิง</p>
                </div>
            </a>

            <a href="product-flap.html" class="category-card">
                <img src="image-flap.jpg" alt="Flap Gate" class="category-img">
                <div class="category-info">
                    <h2>Flap Gate</h2>
                    <p>ประตูกั้นแบบบานปีกนก</p>
                </div>
            </a>

        </div>
    </div>
</body>
</html>
