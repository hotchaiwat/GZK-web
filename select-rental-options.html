<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เลือกโซลูชันการเช่า | GZK Co., Ltd.</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gzk-red: #e74c3c; --gzk-blue: #2c3e50; --gzk-light: #f8f9fa; }
        body { margin: 0; font-family: 'Sarabun', sans-serif; background: var(--gzk-light); color: #333; }
        header { background: white; text-align: center; padding: 20px; border-bottom: 4px solid var(--gzk-blue); }
        .logo-container img { max-width: 220px; }
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .step-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h2 { color: var(--gzk-blue); text-align: center; margin-bottom: 30px; }
        .step-title { font-weight: bold; font-size: 1.2rem; color: var(--gzk-red); margin-bottom: 20px; display: block; }
        .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .option-card { border: 2px solid #eee; border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; }
        .option-card img { width: 100%; height: 220px; object-fit: contain; margin-bottom: 10px; }
        .option-card:hover { border-color: var(--gzk-red); background: #fff5f5; }
        .option-card.selected { border-color: var(--gzk-red); background: #fff5f5; box-shadow: 0 0 10px rgba(231, 76, 60, 0.2); }
        .form-group { margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn-submit { background: var(--gzk-red); color: white; border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; font-size: 1.1rem; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-submit:hover { background: var(--gzk-blue); }
        /* --- Back Button Style --- */
        .back-nav {
            max-width: 1100px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--gzk-blue);
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
            padding: 8px 15px;
            border-radius: 8px;
            border: 1px solid transparent;
        }

        .btn-back:hover {
            color: var(--gzk-red);
            background: rgba(231, 76, 60, 0.05);
            border-color: rgba(231, 76, 60, 0.2);
        }

        .btn-back i {
            font-size: 1.2rem;
        }
        /* เพิ่มส่วนนี้เข้าไปใน <style> ครับ */
.option-card p {
    font-weight: bold; /* ทำให้ตัวหนังสือเป็นตัวหนา */
    font-size: 1.1rem;  /* ขยายขนาดตัวหนังสืออีกนิดให้ดูเด่นขึ้น */
    margin-top: 10px;
    color: var(--gzk-blue);
}
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <a href="index.html"><img src="GZK_logo_with_slogan.jpg" alt="GZK"></a>
        </div>
    </header>
<div class="back-nav">
        <a href="rental-solutions.html" class="btn-back">
            <span>←</span> ย้อนกลับไปหน้าบริการเช่า
        </a>
    </div>
    <div class="container">
        <div class="step-box">
            <h2>ออกแบบโซลูชันรูปแบบการเช่าของคุณ</h2>
            
            <form id="rentalForm">
                <span class="step-title">ขั้นตอนที่ 1: เลือกประเภทประตู</span>
                <div class="options-grid">
                    <div class="option-card" onclick="selectOption('gate', 'Tripod Turnstile', this)">
                        <img src="select-turn.jpg" alt="Tripod">
                        <p>Tripod Turnstile</p>
                    </div>
                    <div class="option-card" onclick="selectOption('gate', 'Swing Gate', this)">
                        <img src="select-swing.jpg" alt="Swing Gate">
                        <p>Swing Gate</p>
                    </div>
                    <div class="option-card" onclick="selectOption('gate', 'Flap Barrier', this)">
                        <img src="select-flap.jpg" alt="Flap Barrier">
                        <p>Flap Barrier</p>
                    </div>
                    
                </div>

                <span class="step-title">ขั้นตอนที่ 2: เลือกวิธีการแสดงตัวตน</span>
                <div class="options-grid">
                    <div class="option-card" onclick="selectOption('auth', 'Face Recognition', this)">
                        <p>Face Scan (AI)</p>
                    </div>
                    <div class="option-card" onclick="selectOption('auth', 'QR Code / Mobile', this)">
                        <p>QR Code / QR on Mobile</p>
                    </div>
                    <div class="option-card" onclick="selectOption('auth', 'RFID Card', this)">
                        <p>Card RFID</p>
                    </div>
                </div>

                <span class="step-title">ขั้นตอนที่ 3: เลือกรูปแบบรายงาน</span>
                <select id="reportType" required>
                    <option value="">-- เลือกรูปแบบรายงาน --</option>
                    <option value="Daily Excel">สรุปรายวัน (Excel) เพื่อส่งเข้า Payroll</option>
                    <option value="Daily Time Attendance">สรุปรายงานตามแบบฟอร์มระบบ Payroll</option>
                    <option value="Real-time Cloud">Real-time Cloud Dashboard พร้อมรายงาน</option>
                    <option value="Custom API">เชื่อมต่อกับระบบเดิม (API)</option>
                </select>

                <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">

                <span class="step-title">ขั้นตอนที่ 4: ข้อมูลติดต่อกลับ</span>
                <div class="form-group">
                    <input type="text" id="userName" placeholder="ชื่อผู้ติดต่อ / ชื่อบริษัท" required>
                </div>
                <div class="form-group">
                    <input type="email" id="userEmail" placeholder="อีเมลของคุณ" required>
                </div>
                <div class="form-group">
    <input type="tel" id="userPhone" placeholder="เบอร์โทรศัพท์ติดต่อกลับ" required>
</div>
                <div class="form-group">
                    <textarea id="userNote" rows="3" placeholder="รายละเอียดเพิ่มเติมที่ต้องการให้เน้น"></textarea>
                </div>

                <input type="hidden" id="selectedGate" name="gate">
                <input type="hidden" id="selectedAuth" name="auth">

                <button type="submit" class="btn-submit">ส่งข้อมูลขอใบเสนอราคา</button>
            </form>
        </div>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("HpXLI5vXNvaagLQTk"); 
       })();
    </script>

    <script>
        // 1. ฟังก์ชันเลือกตัวเลือก
        function selectOption(type, value, element) {
            const cards = element.parentElement.querySelectorAll('.option-card');
            cards.forEach(card => card.classList.remove('selected'));
            element.classList.add('selected');
            
            if(type === 'gate') document.getElementById('selectedGate').value = value;
            if(type === 'auth') document.getElementById('selectedAuth').value = value;
        }

        // 2. ฟังก์ชันส่ง Email
        document.getElementById('rentalForm').onsubmit = function(e) {
            e.preventDefault();
            
            const btn = document.querySelector('.btn-submit');
            const gate = document.getElementById('selectedGate').value;
            const auth = document.getElementById('selectedAuth').value;

            if(!gate || !auth) {
                alert('กรุณาเลือกประเภทประตูและวิธีการแสดงตัวตนให้ครบถ้วนครับ');
                return;
            }

            btn.innerHTML = "กำลังส่งข้อมูล...";
            btn.disabled = true;

            const templateParams = {
                user_name: document.getElementById('userName').value, 
                user_email: document.getElementById('userEmail').value,
                user_phone: document.getElementById('userPhone').value, // เพิ่มบรรทัดนี้
                gate_type: gate,
                auth_type: auth,
                report_type: document.getElementById('reportType').value,
                user_note: document.getElementById('userNote').value
            };

            emailjs.send('service_6uko1w5', 'template_j4veauh', templateParams)
                .then(function(response) {
                   console.log('SUCCESS!', response.status, response.text);
                   alert('ส่งข้อมูลเรียบร้อยแล้ว! ทีมงาน GZK จะติดต่อกลับโดยเร็วที่สุดครับ');
                   window.location.href = "index.html"; 
                }, function(error) {
                   console.log('FAILED...', error);
                   alert('เกิดข้อผิดพลาด: ' + JSON.stringify(error));
                   btn.innerHTML = "ส่งข้อมูลขอใบเสนอราคา";
                   btn.disabled = false;
                });
        };
    </script>
</body>
</html>
